; rcBoatEspNow — long-range RC boat link
;   [transmitter] handheld ESP32-C3: BLE peripheral (phone joystick) -> ESP-NOW
;   [boat]        ESP32-C3 on the boat: ESP-NOW -> ESC PWM
;
; Platform is pinned: Arduino core 2.0.x (IDF 4.4) esp_now/NimBLE APIs differ
; from core 3.x — see version guards in src/common/espnow_link.cpp.

[env]
platform = espressif32@^6.12.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

[env:transmitter]
build_src_filter = +<common/> +<transmitter/>
build_flags = ${env.build_flags} -D ROLE_TRANSMITTER=1
lib_deps = h2zero/NimBLE-Arduino@^1.4.1

[env:boat]
build_src_filter = +<common/> +<boat/>
build_flags = ${env.build_flags} -D ROLE_BOAT=1
lib_deps = madhephaestus/ESP32Servo@^0.13.0
